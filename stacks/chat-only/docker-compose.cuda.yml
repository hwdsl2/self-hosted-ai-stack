services:
  ollama:
    image: hwdsl2/ollama-server:cuda
    container_name: ollama
    restart: always
    volumes:
      - ollama-data:/var/lib/ollama
      - ollama-shared:/var/lib/ollama-shared
      # - ./ollama.env:/ollama.env:ro  # optional: custom config
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:11434/"]
      interval: 5s
      timeout: 3s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  db:
    image: postgres:18
    container_name: litellm-db
    restart: always
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - litellm-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: hwdsl2/litellm-server
    container_name: litellm
    restart: always
    ports:
      - "4000:4000/tcp"
    environment:
      - LITELLM_OLLAMA_BASE_URL=http://ollama:11434
      - LITELLM_DATABASE_URL=postgresql://litellm:litellm@db:5432/litellm
    volumes:
      - litellm-data:/etc/litellm
      - ollama-shared:/var/lib/ollama-shared:ro
      # - ./litellm.env:/litellm.env:ro  # optional: custom config
    depends_on:
      ollama:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  ollama-data:
    name: ollama-data
  ollama-shared:
    name: ollama-shared
  litellm-data:
    name: litellm-data
  litellm-db:
    name: litellm-db